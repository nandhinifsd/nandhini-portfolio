<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
    <link rel="stylesheet" href="assstylesheet.css" type="text/css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
    .contact
    {
        display:grid;
        grid-template-columns:25% 70%;
        grid-template-rows: 80vh;
        grid-template-areas:"con conf";
        gap:40px;
        background-color: black;
        font-family: Arial, Helvetica, sans-serif;
        color: white;
        margin-left:20px;
    
        padding-left:40px;
        
        padding-right:40px;
    }
    .detail{
        grid-area:con;
        border-top:0px;
        border-left: 0px;
        border-right: 10px;
        border-left:0px;
        border-bottom:0px;
        border-color: white;
        border-style: double;
    }
    .contactform{
        grid-area: conf;
    }
    .tableform td{
        padding:5px;
    }
  
    
</style>
    
</head> 
<body>
    <header><h1>Contact Us</h1>
        <nav>
             <a href="index.html">Home</a>
             <a href="AboutMe.html">About Me</a>
       
             <a href="portfolio.html">Portfolio</a>
             <a href="contactus.html">Contact Us</a>
        </nav>
        </header>
        <section class="contact">
            <div class="detail"> 
                <h3>Contact Info: </h3>
                 
                 <p><i class="fa-solid fa-phone"></i>&nbsp;&nbsp;&nbsp;+91 8012333340</pre></p>
                  <p><i class="fa-solid fa-envelope"></i>&nbsp;&nbsp;&nbsp;  coolnaandhi@gmail.com</pre> </p>
                   <p><i class="fa-brands fa-linkedin"></i>&nbsp;&nbsp;&nbsp;  Nandhini Sivakumar</pre></p>
                    <p><i class="fa-brands fa-github"></i>&nbsp;&nbsp;&nbsp; nandhinis_diary</pre></p>
                   </div>
                   <div class="contactform">
                    <h3>Enquiry Form</h3>
                    <form action="success.html" method="post">
                    <table class="tableform"style height:800px;text-align: center;>
                        <tr>
                            <td><label>Name</label></td>
                            <td><input type="txt",name="name",value="" required></td>
                        </tr>
                         <tr>
                            <td><label>Phone</label></td>
                            <td><input type="tel",name="phone",value="", min="0",max="0"pattern[0-9]{10},required></td>
                        </tr>
                         <tr>
                            <td><label>Email</label></td>
                            <td><input type="email",name="Email",value="",required></td>
                    
                        </tr>
                         
                         <tr>
                            <td><label>Organisation Name</label></td>
                            <td><input type="txt",name="companyname",value=""></td>
    
                        </tr>
                        <tr>
                            <td><label>Client Type</label></td>
                            <td><input type="radio",name="client",value="">Individual
                             <input type="radio",name="client",value="">Organisation</td>
                        </tr>
                        <tr>
                            <td><label>Services needed</label></td>
                            <td><input type="checkbox",name="tools",value="Front End">Front End
                             <input type="checkbox",name="tools",value="Back End">Back End<br>
                             
                             <input type="checkbox",name="tools",value="UX design">UX Design
                             <input type="checkbox",name="tools",value="Graphic Design">Graphic Design<br>
                             <input type="checkbox",name="tools",value="Fullstack">Full Stack Development<br>
                             <input type="checkbox",name="tools",value="Database Management">Database Management</td>
                            </td>
                        </tr>
                        <tr>

                            <td><label>Budget</label></td>
                            <td><select>
                                <option>5k-20k</option>
                                <option>20-50k</option>
                                <option>50-100k</option>
                                <option>Hourly Basis</option>
                
                            </select></td>

                            
                        </tr>
                        <tr>
                            <td><label>Description</label>
                            <td><textarea cols="60",rows="350" value="description"> </textarea></td>
                        </tr>
                         <tr>
                           <td><label>Deadline Date</label></td>
                            <td><input type="date",name="deadline",value=""></td>
                            <td><input type="submit" value="Submit"></td>
                            <td><input type="reset" value="Reset"></td>
                         </tr>
                    </table>
                    </form>
                   </div>
                  
        </section>
         <footer>
        <p align="right"><b>www.nandhini.com</b></p>
    </footer>
        
</body>
</html>
